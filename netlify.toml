[build]
  command = "npx vite build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Custom 404 — Netlify auto-serves /404.html with HTTP 404 status on unmatched paths
# when 404.html is in the publish dir. Explicit redirect rule guarantees status code.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[notifications]]
  event = "submission_created"
  url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=auto-insurance"
